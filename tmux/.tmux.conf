# remap prefix
set-option -g prefix C-t
bind C-f send-prefix

# unbind uncomfortable defaluts
unbind C-b
unbind '"'
unbind %
unbind \;
unbind )
unbind (

# split panes
bind + split-window -v -c "#{pane_current_path}"
bind = split-window -h -c "#{pane_current_path}"

# vim-like pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# handle closing
bind X kill-pane -a  # kill all panes except current
bind C kill-window

# pane zoom
bind T resize-pane -Z

# quick access navigation
bind t last-pane
bind o last-window
bind O switch-client -l

# navigate windows
bind ] next-window
bind [ previous-window

# navigate sessions
bind \} switch-client -n
bind \{ switch-client -p

# user prompt
bind c new-window -c "#{pane_current_path}"
bind u command-prompt -p ">> Choose new window name:" "new-window -c '#{pane_current_path}'; rename-window '%%'"
bind d confirm-before -p '>> Close session "#S"? (y/n)' "run-shell 'tmux switch-client -l \\; kill-session -t \"#S\"'"
bind S command-prompt -p '>> Create new session:' "new-session; rename-session '%%"

# reload tmux config
bind z source-file ~/.tmux.conf \; display-message ">> Reloading config..".

# enable copy-mode
bind y copy-mode

# vi copy-mode
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"

# options
set -g default-shell /bin/zsh
set -g set-titles on
set -g display-panes-time 800
set -g display-time 800
set -g renumber-windows on
set -g base-index 1
set -g repeat-time 200
set -g focus-events on
set -g mouse on
set -sg escape-time 0
setw -g pane-base-index 1
setw -g automatic-rename off
setw -g mode-keys vi

# theme setting tokyonight storm
set -g mode-style "fg=#7aa2f7,bg=#3b4261"

set -g message-style "fg=#7aa2f7,bg=#3b4261"
set -g message-command-style "fg=#7aa2f7,bg=#3b4261"

set -g pane-border-style "fg=#3b4261"
set -g pane-active-border-style "fg=#7aa2f7"

set -g status "on"
set -g status-justify "left"
set -g status-position top

set -g status-style "fg=#7aa2f7,bg=#1f2335"

set -g status-left-length "100"
set -g status-right-length "150"

set -g status-left-style NONE
set -g status-right-style NONE

set -g status-left "#[fg=#1d202f,bg=#7aa2f7,bold]   #{session_name} #[fg=#7aa2f7,bg=#1f2335,nobold,nounderscore,noitalics]"
set -g status-right "#[fg=#1f2335,bg=#1f2335,nobold,nounderscore,noitalics]#[fg=#e0af68,bg=#1f2335]  #(source ~/.dotfiles/tmux/tmux-scripts/prices.sh) #[fg=#3b4261]#[fg=#7aa2f7,bg=#3b4261,nobold,nounderscore,noitalics]#[fg=#1d202f,bg=#7aa2f7,bold] 󱩊  #h "

setw -g window-status-activity-style "underscore,fg=#a9b1d6,bg=#1f2335"
setw -g window-status-separator ""
setw -g window-status-style "NONE,fg=#a9b1d6,bg=#1f2335"
setw -g window-status-format "#[fg=#1f2335,bg=#1f2335,nobold,nounderscore,noitalics]#[default] #I:#W #[fg=#1f2335,bg=#1f2335,nobold,nounderscore,noitalics]"
setw -g window-status-current-format "#[fg=#1f2335,bg=#3b4261,nobold,nounderscore,noitalics]#[fg=#7aa2f7,bg=#3b4261,bold]  #[underscore]#I:#W#[nounderscore]  #[fg=#3b4261,bg=#1f2335,nobold,nounderscore,noitalics]"
